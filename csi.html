<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroDesk · CSI V3.7 · Force des devises</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111624;
  --bg-tertiary: #1a2033;
  --bg-elevated: #222a42;
  --border: #2a3248;
  --border-light: #3a4563;
  --text-primary: #e8ecf4;
  --text-secondary: #9aa5bd;
  --text-muted: #6b7490;
  --accent: #4a9eff;
  --green: #26d07c;
  --red: #ff4757;
  --yellow: #ffb84a;
  --purple: #b084ff;
  --grid: rgba(255,255,255,0.04);
  --crosshair: rgba(255,255,255,0.25);
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  overflow: hidden;
}

.app { display: grid; grid-template-rows: 48px 40px 1fr; height: 100vh; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.brand-title { font-size: 14px; }
.brand-sub { color: var(--text-muted); font-size: 11px; font-weight: 400; margin-left: 4px; }

.session-info { display: flex; gap: 8px; font-size: 11px; }
.session-badge {
  padding: 3px 10px; border-radius: 4px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  color: var(--text-secondary);
}
.session-badge.active {
  background: rgba(38, 208, 124, 0.1);
  border-color: var(--green); color: var(--green);
}

.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.tf-group, .pair-group { display: flex; gap: 4px; align-items: center; }
.tf-label {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-right: 8px; font-weight: 600;
}
.divider { width: 1px; height: 20px; background: var(--border); margin: 0 10px; }

button.pill {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px; font-size: 11px;
  border-radius: 4px; cursor: pointer;
  font-family: inherit; font-weight: 500;
  transition: all 0.15s; white-space: nowrap;
}
button.pill:hover {
  border-color: var(--border-light);
  color: var(--text-primary); background: var(--bg-tertiary);
}
button.pill.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}

.toolbar-right { margin-left: auto; display: flex; gap: 6px; padding-left: 16px; }
.icon-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 4px; cursor: pointer;
}
.icon-btn:hover {
  border-color: var(--border-light);
  color: var(--text-primary); background: var(--bg-tertiary);
}
.icon-btn svg { width: 14px; height: 14px; }

.main { display: grid; grid-template-columns: 220px 1fr 240px; overflow: hidden; }

.pair-panel, .legend-panel { background: var(--bg-secondary); overflow-y: auto; }
.pair-panel { border-right: 1px solid var(--border); }
.legend-panel { border-left: 1px solid var(--border); }
.panel-header {
  padding: 10px 14px; font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--bg-secondary); z-index: 2;
}
.pair-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 8px; align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(42, 50, 72, 0.4);
  cursor: pointer;
}
.pair-row:hover { background: var(--bg-tertiary); }
.pair-row.hidden { opacity: 0.4; }
.pair-name { font-weight: 600; font-size: 12px; }
.pair-price { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
.pair-change {
  font-size: 10px; padding: 1px 5px;
  border-radius: 3px;
  font-variant-numeric: tabular-nums; font-weight: 600;
}
.pair-change.up { background: rgba(38, 208, 124, 0.15); color: var(--green); }
.pair-change.down { background: rgba(255, 71, 87, 0.15); color: var(--red); }

.div-badge {
  display: inline-block; font-size: 9px;
  padding: 1px 4px; border-radius: 2px;
  margin-left: 4px; font-weight: 700;
}
.div-badge.p1 { background: var(--red); color: #fff; }
.div-badge.p2 { background: var(--yellow); color: #000; }
.div-badge.p3 { background: var(--purple); color: #fff; }

.legend-row {
  display: grid; grid-template-columns: 14px 1fr auto;
  gap: 8px; align-items: center;
  padding: 7px 12px; cursor: pointer;
  font-size: 11px;
  border-bottom: 1px solid rgba(42, 50, 72, 0.3);
}
.legend-row:hover { background: var(--bg-tertiary); }
.legend-row.hidden { opacity: 0.35; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
.legend-name { font-weight: 500; }
.legend-value { font-variant-numeric: tabular-nums; font-size: 10px; }

.chart-area { position: relative; background: var(--bg-primary); overflow: hidden; }
.chart-header { position: absolute; top: 12px; left: 16px; z-index: 10; pointer-events: none; }
.chart-title { font-size: 16px; font-weight: 600; }
.chart-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

#chart { width: 100%; height: 100%; display: block; cursor: crosshair; user-select: none; }

.grid-line { stroke: var(--grid); stroke-dasharray: 2 3; }
.axis-line { stroke: var(--border); }
.axis-text { fill: var(--text-muted); font-size: 10px; }
.axis-label {
  fill: var(--text-secondary); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.zero-line { stroke: var(--border-light); stroke-width: 1; stroke-dasharray: 4 3; }
.pair-line {
  fill: none; stroke-width: 1.5; opacity: 0.9;
  transition: opacity 0.1s, stroke-width 0.1s;
}
.pair-line.dim { opacity: 0.12; }
.pair-line.highlight { stroke-width: 2.5; opacity: 1; }
.crosshair-line {
  stroke: var(--crosshair); stroke-width: 1;
  stroke-dasharray: 3 3; pointer-events: none;
}
.crosshair-label { fill: var(--text-primary); font-size: 10px; font-variant-numeric: tabular-nums; }
.crosshair-label-bg { fill: var(--bg-elevated); stroke: var(--border-light); }
.axis-hitzone { fill: transparent; }
.axis-hitzone.y { cursor: ns-resize; }
.axis-hitzone.x { cursor: ew-resize; }

.tooltip {
  position: absolute;
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 11px;
  pointer-events: none;
  box-shadow: var(--shadow);
  z-index: 20;
  min-width: 200px;
  opacity: 0;
  transition: opacity 0.1s;
}
.tooltip.visible { opacity: 1; }
.tooltip-header {
  font-weight: 600; margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; gap: 10px;
}
.tooltip-row {
  display: grid; grid-template-columns: 10px 1fr auto;
  gap: 6px; align-items: center;
  padding: 2px 0;
  font-variant-numeric: tabular-nums;
}
.tooltip-swatch { width: 8px; height: 8px; border-radius: 2px; }

.status-bar {
  position: absolute; bottom: 8px; left: 16px;
  display: flex; gap: 14px;
  font-size: 10px; color: var(--text-muted);
  pointer-events: none;
}
.status-item strong { color: var(--text-secondary); font-weight: 600; }

.div-panel {
  position: absolute; top: 60px; right: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 11px; z-index: 15;
  box-shadow: var(--shadow);
  max-width: 260px;
  display: none;
}
.div-panel.visible { display: block; }
.div-panel h4 {
  font-size: 10px;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px; font-weight: 600;
}
.div-item {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 8px; padding: 6px 0;
  align-items: center; cursor: pointer;
}
.div-item + .div-item { border-top: 1px solid rgba(42, 50, 72, 0.5); }
.div-item:hover { background: rgba(255,255,255,0.03); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <span class="brand-title">MacroDesk</span>
        <span class="brand-sub">· CSI V3.7 · Force des devises Yahoo</span>
      </div>
    </div>
    <div class="session-info">
      <span class="session-badge" id="session-sydney">Sydney</span>
      <span class="session-badge" id="session-tokyo">Tokyo</span>
      <span class="session-badge" id="session-london">London</span>
      <span class="session-badge" id="session-ny">New York</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="tf-group">
      <span class="tf-label">TF</span>
      <button class="pill tf-btn" data-tf="15m">15m</button>
      <button class="pill tf-btn" data-tf="1H">1H</button>
      <button class="pill tf-btn active" data-tf="4H">4H</button>
      <button class="pill tf-btn" data-tf="Daily">Daily</button>
    </div>
    <div class="divider"></div>
    <div class="pair-group">
      <span class="tf-label">Groupe</span>
      <button class="pill group-btn active" data-group="all">Tous (8)</button>
      <button class="pill group-btn" data-group="tokyo">Tokyo (4)</button>
      <button class="pill group-btn" data-group="majors">Majors (5)</button>
      <button class="pill group-btn" data-group="commodity">Commodity (3)</button>
      <button class="pill group-btn" data-group="havens">Havens (2)</button>
    </div>
    <div class="divider"></div>
    <div class="pair-group">
      <span class="tf-label">Mode</span>
      <button class="pill mode-btn active" data-mode="base100" title="Base 100 — rebase auto sur fenêtre visible, scores comparables entre TFs">Base 100</button>
      <button class="pill mode-btn" data-mode="pct" title="%Change — magnitude réelle, non comparable entre TFs">%Change</button>
    </div>
    <div class="toolbar-right">
      <button class="icon-btn" id="btn-divs" title="Divergences">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
      </button>
      <button class="icon-btn" id="btn-reset" title="Reset (R)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button class="icon-btn" id="btn-fullscreen" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="pair-panel">
      <div class="panel-header">Devises · <span id="pair-count">8</span></div>
      <div id="pair-list"></div>
    </div>

    <div class="chart-area">
      <div class="chart-header">
        <div class="chart-title">Currency Strength Index</div>
        <div class="chart-sub" id="chart-sub">4H · 8 devises · 180 points</div>
      </div>

      <div class="div-panel" id="div-panel">
        <h4>Divergences actives</h4>
        <div id="div-list"></div>
      </div>

      <svg id="chart" xmlns="http://www.w3.org/2000/svg"></svg>

      <div class="status-bar">
        <span class="status-item"><strong>Pan X:</strong> drag chart</span>
        <span class="status-item"><strong>Zoom Y:</strong> drag ou scroll axe Y</span>
        <span class="status-item"><strong>Zoom X:</strong> drag ou scroll axe X</span>
        <span class="status-item"><strong>Reset:</strong> R / dblclick</span>
        <span class="status-item" id="status-cursor"></span>
      </div>

      <div class="tooltip" id="tooltip"></div>
    </div>

    <div class="legend-panel">
      <div class="panel-header">Légende · Force</div>
      <div id="legend"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const SVG_NS = 'http://www.w3.org/2000/svg';

// ───────── Currencies (ce qu'on trace : 8 lignes) ─────────
const CURRENCIES = [
  { symbol: 'USD', color: '#4a9eff', group: ['majors', 'tokyo'] },
  { symbol: 'EUR', color: '#b084ff', group: ['majors'] },
  { symbol: 'JPY', color: '#ff4757', group: ['majors', 'tokyo', 'havens'] },
  { symbol: 'GBP', color: '#ce93d8', group: ['majors'] },
  { symbol: 'AUD', color: '#26d07c', group: ['majors', 'tokyo', 'commodity'] },
  { symbol: 'NZD', color: '#ffb84a', group: ['tokyo', 'commodity'] },
  { symbol: 'CAD', color: '#00d4c4', group: ['commodity'] },
  { symbol: 'CHF', color: '#f48fb1', group: ['havens'] }
];

// ───────── Pairs V3.7 (17 paires Yahoo, alignées avec n8n workflow) ─────────
// Chaque paire a une devise de base et une devise quote.
const PAIRS = [
  { symbol: 'EURUSD', base: 'EUR', quote: 'USD', vol: 0.35 },
  { symbol: 'GBPUSD', base: 'GBP', quote: 'USD', vol: 0.45 },
  { symbol: 'AUDUSD', base: 'AUD', quote: 'USD', vol: 0.45 },
  { symbol: 'NZDUSD', base: 'NZD', quote: 'USD', vol: 0.4 },
  { symbol: 'USDJPY', base: 'USD', quote: 'JPY', vol: 0.4 },
  { symbol: 'USDCHF', base: 'USD', quote: 'CHF', vol: 0.35 },
  { symbol: 'USDCAD', base: 'USD', quote: 'CAD', vol: 0.3 },
  { symbol: 'EURJPY', base: 'EUR', quote: 'JPY', vol: 0.5 },
  { symbol: 'GBPJPY', base: 'GBP', quote: 'JPY', vol: 0.7 },
  { symbol: 'AUDJPY', base: 'AUD', quote: 'JPY', vol: 0.6 },
  { symbol: 'NZDJPY', base: 'NZD', quote: 'JPY', vol: 0.55 },
  { symbol: 'CHFJPY', base: 'CHF', quote: 'JPY', vol: 0.35 },
  { symbol: 'CADJPY', base: 'CAD', quote: 'JPY', vol: 0.45 },
  { symbol: 'EURGBP', base: 'EUR', quote: 'GBP', vol: 0.25 },
  { symbol: 'EURCHF', base: 'EUR', quote: 'CHF', vol: 0.25 },
  { symbol: 'EURCAD', base: 'EUR', quote: 'CAD', vol: 0.3 },
  { symbol: 'AUDNZD', base: 'AUD', quote: 'NZD', vol: 0.3 }
];

const TF_CONFIG = {
  '15m':   { points: 400, stepMs: 15*60*1000,   label: '7 jours' },
  '1H':    { points: 300, stepMs: 60*60*1000,   label: '15 jours' },
  '4H':    { points: 240, stepMs: 4*60*60*1000, label: '60 jours' },
  'Daily': { points: 128, stepMs: 24*60*60*1000,label: '6 mois' }
};

// ═══════════════════════════════════════════════════════════════
// V3.7 — Chargement des vraies données Yahoo depuis macrodata.json
// ═══════════════════════════════════════════════════════════════

const state = {
  tf: '4H',
  group: 'all',
  displayMode: 'base100',  // 'base100' | 'pct'
  pairData: {},   // (non utilisé en V3.7 — gardé pour compat future)
  data: {},       // { CURRENCY: [{t, v, idx}, ...] } -- force par devise
  divergences: [],
  visible: new Set(CURRENCIES.map(c => c.symbol)),
  hovered: null,
  xDomain: null,
  yDomain: null,
  // V3.7 spécifique
  rawData: null,     // JSON complet de macrodata.json
  csiAnalysis: null, // csiV37Analysis pour les divergences/rankings
  lastUpdate: null,
  loadError: null
};

// ───────── Chargement JSON (appelé une fois au démarrage) ─────────
async function loadMacroData() {
  try {
    const sources = [
      'data/macrodata.json?t=' + Date.now(),  // relative (si servi depuis macrodesks/)
      '/macrodesks/data/macrodata.json?t=' + Date.now()  // absolute (fallback)
    ];
    let json = null;
    for (const url of sources) {
      try {
        const response = await fetch(url, { cache: 'no-store' });
        if (response.ok) { json = await response.json(); break; }
      } catch(e) { /* try next */ }
    }
    if (!json) throw new Error('Aucune source JSON accessible');

    // Le node n8n fait un double wrapping : { forceDevises: {...}, ...payload }
    // On prend forceDevises en priorité, sinon la racine.
    const payload = json.forceDevises || json;
    if (!payload.timeSeries) throw new Error('timeSeries manquant dans macrodata.json');

    state.rawData = payload;
    state.csiAnalysis = payload.csiAnalysis || null;
    state.lastUpdate = payload.last_update || payload._generated || null;

    console.log('[CSI V3.7] Données chargées :', {
      version: payload.version,
      last_update: state.lastUpdate,
      timeSeries: Object.keys(payload.timeSeries).map(tf => ({
        tf: tf,
        points: (payload.timeSeries[tf] || []).length
      }))
    });
    return true;
  } catch(err) {
    state.loadError = err.message;
    console.error('[CSI V3.7] Erreur chargement :', err);
    return false;
  }
}

// ───────── buildData : transforme rawData → state.data pour render ─────────
function buildData() {
  if (!state.rawData || !state.rawData.timeSeries) {
    state.data = {};
    state.divergences = [];
    return;
  }

  const series = state.rawData.timeSeries[state.tf] || [];
  if (series.length === 0) {
    console.warn('[CSI V3.7] Série vide pour TF=' + state.tf);
    state.data = {};
    state.divergences = [];
    return;
  }

  // Chaque point de macrodata.json a deux formats possibles :
  //   Format A (V3.7.1 macrodata.js) : { t, scores:{AUD,NZD,...}, pctChange:{...} }
  //   Format B (legacy plat)          : { t, USD: 54, EUR: 43, ... }
  // On supporte les deux.
  state.data = {};
  CURRENCIES.forEach(c => {
    const currencyData = [];
    const seenT = new Set();  // dédoublonnage par timestamp
    series.forEach((pt, i) => {
      if (!pt || typeof pt.t !== 'number') return;
      let score;
      if (pt.scores && typeof pt.scores === 'object') {
        score = pt.scores[c.symbol];
      } else {
        score = pt[c.symbol];
      }
      if (typeof score !== 'number' || isNaN(score) || !isFinite(score)) return;
      // Clamp score dans [0, 100] pour éviter outliers
      if (score < 0) score = 0;
      if (score > 100) score = 100;
      // Normalise t : supporte timestamp en ms ou en s
      let tMs = pt.t;
      if (tMs < 1e11) tMs = tMs * 1000;  // si < 10^11, c'est en secondes
      if (seenT.has(tMs)) return;
      seenT.add(tMs);
      // Conversion score 0-100 → raw signé (~-scale..+scale)
      // score = 50 + (raw / scale) * 50  ⇒  raw = (score - 50) * scale / 50
      const scale = SCALE_BY_TF[state.tf] || 1;
      const v = ((score - 50) / 50) * scale;
      currencyData.push({ t: tMs, v: v, idx: i, score: score });
    });
    // Tri par timestamp croissant (sécurité si data désordonnée)
    currencyData.sort((a, b) => a.t - b.t);

    // ── LISSAGE moving average (fenêtre 3 points) ──
    // Rend les courbes fluides sans artefacts visuels (comme le demo)
    // On ne lisse que si on a au moins 3 points
    if (currencyData.length >= 3) {
      const smoothed = currencyData.map((pt, i) => {
        const prev = currencyData[i - 1] || pt;
        const next = currencyData[i + 1] || pt;
        // Moyenne pondérée : point courant compte 2×, voisins 1×
        const vAvg = (prev.v + pt.v * 2 + next.v) / 4;
        const scoreAvg = (prev.score + pt.score * 2 + next.score) / 4;
        return { t: pt.t, v: vAvg, idx: pt.idx, score: scoreAvg };
      });
      currencyData.length = 0;
      currencyData.push(...smoothed);
    }

    // Ré-index après tri
    currencyData.forEach((pt, i) => { pt.idx = i; });
    if (currencyData.length > 0) state.data[c.symbol] = currencyData;
  });

  // Log diagnostic : nombre de points par devise pour ce TF
  const diagnostic = {};
  CURRENCIES.forEach(c => {
    diagnostic[c.symbol] = state.data[c.symbol] ? state.data[c.symbol].length : 0;
  });
  console.log('[CSI V3.7] TF=' + state.tf + ' points par devise :', diagnostic);

  // ───── Divergences V3.7 ─────
  // Lues depuis csiAnalysis.divergences (calculées par le node "Agréger Toutes Sources")
  // Chaque divergence n8n = { type: 'bullish_hidden'|'bearish_classic'|..., currency:'AUD', tf:'Daily', ... }
  state.divergences = [];
  if (state.csiAnalysis && Array.isArray(state.csiAnalysis.divergences)) {
    state.csiAnalysis.divergences.forEach(dv => {
      // Ne garder que les divergences du TF actuel
      if (dv.tf && dv.tf !== state.tf) return;
      if (!dv.currency) return;

      // Classification P1/P2/P3 selon le type
      let typeCode = 'P2';
      if (dv.type && /bearish|classic|regular/i.test(dv.type)) typeCode = 'P1';
      else if (dv.type && /hidden|bullish/i.test(dv.type)) typeCode = 'P2';
      else if (dv.type && /weak|confluence/i.test(dv.type)) typeCode = 'P3';

      // Indices de fin/début : prendre les 30 derniers points par défaut
      const s = state.data[dv.currency];
      if (!s || s.length < 10) return;
      const endIdx = s.length - 1;
      const startIdx = Math.max(0, endIdx - 29);

      state.divergences.push({
        kind: 'currency',
        symbol: dv.currency,
        type: typeCode,
        label: dv.label || dv.type || 'Divergence',
        startIdx: startIdx,
        endIdx: endIdx
      });
    });
  }
}

function el(name, attrs, children) {
  const e = document.createElementNS(SVG_NS, name);
  if (attrs) for (const k in attrs) if (attrs[k] != null) e.setAttribute(k, attrs[k]);
  if (children != null) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function matchesGroup(p) {
  if (!p) return false;
  if (state.group === 'all') return true;
  return p.group.includes(state.group);
}

// ───────── CSI V3.2 scales per TF ─────────
// Échelle de normalisation du score raw selon le TF.
// Plus le TF est court, plus scale est petit (la même magnitude de raw compte davantage).
const SCALE_BY_TF = {
  '15m':   0.2,
  '1H':    0.3,
  '4H':    0.8,
  'Daily': 1.5
};

// ───────── Transform helpers (base 100 V3.2 / %change) ─────────
// Mode base100 : échelle absolue 0-100, formule CSI V3.2 :
//   score = clip(50 + (raw / scale_TF) * 50, 0, 100)
// Mode pct : magnitude relative au pivot visible :
//   score = raw - pivot  (le raw est déjà en % cumulé dans notre génération)

const pivots = {};

function rebuildPivots() {
  for (const sym in pivots) delete pivots[sym];
  if (state.displayMode !== 'pct') return;
  if (!state.xDomain) return;
  const [x0] = state.xDomain;
  CURRENCIES.forEach(c => {
    if (!state.visible.has(c.symbol) || !matchesGroup(c)) return;
    const s = state.data[c.symbol];
    if (!s) return;
    let pivot = null;
    for (let i = 0; i < s.length; i++) {
      if (s[i].t >= x0) { pivot = s[i]; break; }
    }
    if (!pivot) pivot = s[s.length - 1];
    pivots[c.symbol] = pivot.v;
  });
}

function clip(v, min, max) {
  return v < min ? min : (v > max ? max : v);
}

function transformValue(rawV, symbol) {
  if (state.displayMode === 'base100') {
    const scale = SCALE_BY_TF[state.tf] || 1;
    return clip(50 + (rawV / scale) * 50, 0, 100);
  }
  const pivot = pivots[symbol];
  if (pivot == null) return 0;
  return rawV - pivot;
}

function referenceValue() {
  return state.displayMode === 'base100' ? 50 : 0;
}

function formatValue(v, opts) {
  const decimals = (opts && opts.decimals != null) ? opts.decimals : 2;
  if (state.displayMode === 'base100') {
    return v.toFixed(decimals);
  }
  return (v > 0 ? '+' : '') + v.toFixed(decimals) + '%';
}

// Retourne la couleur d'une valeur selon son régime de force
// - base100 : vert fort >=70, vert >=50, rouge <50, rouge fort <=30
// - pct     : vert >=0, rouge <0
function colorForValue(v) {
  if (state.displayMode === 'base100') {
    if (v >= 70) return '#26d07c';
    if (v >= 50) return '#9aa5bd';
    if (v > 30)  return '#ffb84a';
    return '#ff4757';
  }
  return v >= 0 ? '#26d07c' : '#ff4757';
}

function formatTime(t) {
  const d = new Date(t);
  const pad = n => String(n).padStart(2,'0');
  if (state.tf === 'Daily') return pad(d.getDate()) + '/' + pad(d.getMonth()+1);
  if (state.tf === '4H') return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + ' ' + pad(d.getHours()) + 'h';
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function formatTimeFull(t) {
  const d = new Date(t);
  const pad = n => String(n).padStart(2,'0');
  return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

const chartEl = document.getElementById('chart');
const tooltipEl = document.getElementById('tooltip');
const chartArea = document.querySelector('.chart-area');
const margin = { top: 56, right: 56, bottom: 30, left: 52 };

let W = 0, H = 0, innerW = 0, innerH = 0;

function measure() {
  const r = chartArea.getBoundingClientRect();
  W = r.width; H = r.height;
  innerW = Math.max(50, W - margin.left - margin.right);
  innerH = Math.max(50, H - margin.top - margin.bottom);
  chartEl.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
  chartEl.setAttribute('width', W);
  chartEl.setAttribute('height', H);
}

function computeDomains() {
  // Fenêtre X par défaut si absente
  if (!state.xDomain) {
    let tMin = Infinity, tMax = -Infinity;
    CURRENCIES.forEach(c => {
      if (!state.visible.has(c.symbol) || !matchesGroup(c)) return;
      const s = state.data[c.symbol];
      if (!s) return;
      if (s[0].t < tMin) tMin = s[0].t;
      if (s[s.length - 1].t > tMax) tMax = s[s.length - 1].t;
    });
    if (!isFinite(tMin)) { tMin = Date.now() - 1000; tMax = Date.now(); }
    state.xDomain = [tMin, tMax];
  }

  rebuildPivots();

  // Domaine Y : en base100 on fixe 0-100 absolu (l'échelle est universelle).
  //             en pct on rebase auto sur la fenêtre visible.
  if (!state.yDomain) {
    if (state.displayMode === 'base100') {
      state.yDomain = [0, 100];
    } else {
      let yMin = Infinity, yMax = -Infinity;
      const [x0, x1] = state.xDomain;
      CURRENCIES.forEach(c => {
        if (!state.visible.has(c.symbol) || !matchesGroup(c)) return;
        const s = state.data[c.symbol];
        if (!s) return;
        s.forEach(d => {
          if (d.t < x0 || d.t > x1) return;
          const tv = transformValue(d.v, c.symbol);
          if (tv < yMin) yMin = tv;
          if (tv > yMax) yMax = tv;
        });
      });
      if (!isFinite(yMin)) { yMin = -1; yMax = 1; }
      const pad = (yMax - yMin) * 0.1 || 0.5;
      state.yDomain = [yMin - pad, yMax + pad];
    }
  }
}

function niceTicks(min, max, count) {
  const range = max - min;
  if (range <= 0) return [min];
  const roughStep = range / count;
  const mag = Math.pow(10, Math.floor(Math.log10(roughStep)));
  const norm = roughStep / mag;
  let step;
  if (norm < 1.5) step = 1 * mag;
  else if (norm < 3) step = 2 * mag;
  else if (norm < 7) step = 5 * mag;
  else step = 10 * mag;
  const ticks = [];
  const first = Math.ceil(min / step) * step;
  for (let v = first; v <= max; v += step) ticks.push(+v.toFixed(10));
  return ticks;
}

function timeTicks(min, max, count) {
  const range = max - min;
  const stepMs = range / count;
  const intervals = [
    60*1000, 5*60*1000, 15*60*1000, 30*60*1000, 60*60*1000,
    3*60*60*1000, 6*60*60*1000, 12*60*60*1000, 24*60*60*1000,
    2*24*60*60*1000, 7*24*60*60*1000, 14*24*60*60*1000, 30*24*60*60*1000
  ];
  let step = intervals[intervals.length - 1];
  for (const i of intervals) { if (i >= stepMs) { step = i; break; } }
  const ticks = [];
  const first = Math.ceil(min / step) * step;
  for (let v = first; v <= max; v += step) ticks.push(v);
  return ticks;
}

function render() {
  measure();
  computeDomains();

  const [x0, x1] = state.xDomain;
  const [y0, y1] = state.yDomain;
  const xSpan = x1 - x0 || 1;
  const ySpan = y1 - y0 || 1;
  const xScale = t => margin.left + ((t - x0) / xSpan) * innerW;
  const yScale = v => margin.top + innerH - ((v - y0) / ySpan) * innerH;

  while (chartEl.firstChild) chartEl.removeChild(chartEl.firstChild);

  // Defs
  const defs = el('defs');
  const clip = el('clipPath', { id: 'clip-plot' });
  clip.appendChild(el('rect', { x: margin.left, y: margin.top, width: innerW, height: innerH }));
  defs.appendChild(clip);
  chartEl.appendChild(defs);

  // Plot background
  chartEl.appendChild(el('rect', {
    x: margin.left, y: margin.top,
    width: innerW, height: innerH,
    fill: 'transparent', class: 'plot-bg'
  }));

  // Grids
  const yTicks = niceTicks(y0, y1, 6);
  yTicks.forEach(v => {
    const y = yScale(v);
    chartEl.appendChild(el('line', {
      class: 'grid-line',
      x1: margin.left, x2: margin.left + innerW, y1: y, y2: y
    }));
  });
  const xTicks = timeTicks(x0, x1, 8);
  xTicks.forEach(t => {
    const x = xScale(t);
    if (x < margin.left || x > margin.left + innerW) return;
    chartEl.appendChild(el('line', {
      class: 'grid-line',
      x1: x, x2: x, y1: margin.top, y2: margin.top + innerH
    }));
  });

  // Reference line (50 en base100, 0 en pct)
  const ref = referenceValue();
  if (y0 < ref && y1 > ref) {
    const yRef = yScale(ref);
    chartEl.appendChild(el('line', {
      class: 'zero-line',
      x1: margin.left, x2: margin.left + innerW, y1: yRef, y2: yRef
    }));
  }

  // Seuils 70/30 en base100 uniquement
  if (state.displayMode === 'base100') {
    [
      { v: 70, color: 'rgba(38, 208, 124, 0.25)' },
      { v: 30, color: 'rgba(255, 71, 87, 0.25)' }
    ].forEach(th => {
      if (y0 < th.v && y1 > th.v) {
        const y = yScale(th.v);
        chartEl.appendChild(el('line', {
          x1: margin.left, x2: margin.left + innerW,
          y1: y, y2: y,
          stroke: th.color, 'stroke-width': 1, 'stroke-dasharray': '2 4'
        }));
        chartEl.appendChild(el('text', {
          x: margin.left + innerW - 4, y: y - 3,
          fill: th.color, 'font-size': 9, 'font-weight': 600,
          'text-anchor': 'end'
        }, th.v.toString()));
      }
    });
  }

  // Lines (tracé simple M/L comme le demo — lissage fait en amont via moving average)
  const linesG = el('g', { 'clip-path': 'url(#clip-plot)' });
  chartEl.appendChild(linesG);

  // Courbe continue : aucune coupure (les weekends sont traversés par une ligne droite)
  CURRENCIES.forEach(c => {
    if (!state.visible.has(c.symbol) || !matchesGroup(c)) return;
    const s = state.data[c.symbol];
    if (!s || s.length === 0) return;

    let d = '';
    let isFirst = true;
    s.forEach((pt) => {
      if (pt == null || typeof pt.t !== 'number' || typeof pt.v !== 'number') return;
      if (isNaN(pt.v) || !isFinite(pt.v)) return;
      const tv = transformValue(pt.v, c.symbol);
      if (isNaN(tv) || !isFinite(tv)) return;
      const x = xScale(pt.t);
      const y = yScale(tv);
      if (isNaN(x) || isNaN(y)) return;

      d += (isFirst ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
      isFirst = false;
    });

    if (!d) return;

    let cls = 'pair-line';
    if (state.hovered && state.hovered !== c.symbol) cls += ' dim';
    if (state.hovered === c.symbol) cls += ' highlight';
    linesG.appendChild(el('path', {
      d: d, class: cls, stroke: c.color, 'data-symbol': c.symbol
    }));
  });

  // Divergences
  state.divergences.forEach(dv => {
    const color = dv.type === 'P1' ? '#ff4757' : dv.type === 'P2' ? '#ffb84a' : '#b084ff';

    if (dv.kind === 'currency') {
      // Divergence sur une devise : ligne pointillée sur sa courbe
      if (!state.visible.has(dv.symbol)) return;
      const c = CURRENCIES.find(x => x.symbol === dv.symbol);
      if (!c || !matchesGroup(c)) return;
      const s = state.data[dv.symbol];
      if (!s) return;
      const p1 = s[dv.startIdx], p2 = s[dv.endIdx];
      if (!p1 || !p2) return;
      const x1v = xScale(p1.t), y1v = yScale(transformValue(p1.v, dv.symbol));
      const x2v = xScale(p2.t), y2v = yScale(transformValue(p2.v, dv.symbol));
      linesG.appendChild(el('line', {
        x1: x1v, y1: y1v, x2: x2v, y2: y2v,
        stroke: color, 'stroke-width': 2, 'stroke-dasharray': '4 2'
      }));
      linesG.appendChild(el('circle', { cx: x1v, cy: y1v, r: 4, fill: color, stroke: '#fff', 'stroke-width': 2 }));
      linesG.appendChild(el('circle', { cx: x2v, cy: y2v, r: 4, fill: color, stroke: '#fff', 'stroke-width': 2 }));
      linesG.appendChild(el('text', {
        x: x2v + 7, y: y2v - 6,
        fill: color, 'font-size': 10, 'font-weight': 700
      }, dv.type));
    } else if (dv.kind === 'pair') {
      // Divergence sur couple (ex: AUD vs JPY) : on trace entre les 2 courbes au milieu
      if (!state.visible.has(dv.a) || !state.visible.has(dv.b)) return;
      const ca = CURRENCIES.find(x => x.symbol === dv.a);
      const cb = CURRENCIES.find(x => x.symbol === dv.b);
      if (!ca || !cb || !matchesGroup(ca) || !matchesGroup(cb)) return;
      const sa = state.data[dv.a], sb = state.data[dv.b];
      if (!sa || !sb) return;
      const a1 = sa[dv.startIdx], a2 = sa[dv.endIdx];
      const b1 = sb[dv.startIdx], b2 = sb[dv.endIdx];
      if (!a1 || !a2 || !b1 || !b2) return;
      // milieu entre les 2 courbes
      const mid1v = (transformValue(a1.v, dv.a) + transformValue(b1.v, dv.b)) / 2;
      const mid2v = (transformValue(a2.v, dv.a) + transformValue(b2.v, dv.b)) / 2;
      const x1v = xScale(a1.t), y1v = yScale(mid1v);
      const x2v = xScale(a2.t), y2v = yScale(mid2v);
      linesG.appendChild(el('line', {
        x1: x1v, y1: y1v, x2: x2v, y2: y2v,
        stroke: color, 'stroke-width': 2, 'stroke-dasharray': '2 2', opacity: 0.6
      }));
      linesG.appendChild(el('circle', { cx: x1v, cy: y1v, r: 3, fill: color, stroke: '#fff', 'stroke-width': 1 }));
      linesG.appendChild(el('circle', { cx: x2v, cy: y2v, r: 3, fill: color, stroke: '#fff', 'stroke-width': 1 }));
      linesG.appendChild(el('text', {
        x: x2v + 7, y: y2v - 4,
        fill: color, 'font-size': 9, 'font-weight': 700
      }, dv.type + ' ' + dv.symbol));
    }
  });

  // X axis
  const xAxisY = margin.top + innerH;
  chartEl.appendChild(el('line', {
    class: 'axis-line',
    x1: margin.left, x2: margin.left + innerW, y1: xAxisY, y2: xAxisY
  }));
  xTicks.forEach(t => {
    const x = xScale(t);
    if (x < margin.left - 20 || x > margin.left + innerW + 20) return;
    chartEl.appendChild(el('line', { class: 'axis-line', x1: x, x2: x, y1: xAxisY, y2: xAxisY + 5 }));
    chartEl.appendChild(el('text', {
      class: 'axis-text', x: x, y: xAxisY + 17, 'text-anchor': 'middle'
    }, formatTime(t)));
  });

  // Y axes
  chartEl.appendChild(el('line', {
    class: 'axis-line',
    x1: margin.left, x2: margin.left, y1: margin.top, y2: margin.top + innerH
  }));
  chartEl.appendChild(el('line', {
    class: 'axis-line',
    x1: margin.left + innerW, x2: margin.left + innerW, y1: margin.top, y2: margin.top + innerH
  }));
  yTicks.forEach(v => {
    const y = yScale(v);
    const label = formatValue(v, { decimals: state.displayMode === 'base100' ? 1 : 1 });
    chartEl.appendChild(el('text', {
      class: 'axis-text', x: margin.left - 8, y: y + 3, 'text-anchor': 'end'
    }, label));
    chartEl.appendChild(el('text', {
      class: 'axis-text', x: margin.left + innerW + 8, y: y + 3, 'text-anchor': 'start'
    }, label));
  });

  // Y axis label
  const labelX = margin.left - 38;
  const labelY = margin.top + innerH / 2;
  chartEl.appendChild(el('text', {
    class: 'axis-label',
    x: labelX, y: labelY,
    transform: 'rotate(-90 ' + labelX + ' ' + labelY + ')',
    'text-anchor': 'middle'
  }, state.displayMode === 'base100' ? 'CSI V3.2 · 0-100' : 'Force %'));

  // Hitzones (zoom on axes) — placed AFTER lines so they catch wheel events
  chartEl.appendChild(el('rect', {
    class: 'axis-hitzone y',
    x: 0, y: margin.top, width: margin.left, height: innerH
  }));
  chartEl.appendChild(el('rect', {
    class: 'axis-hitzone y',
    x: margin.left + innerW, y: margin.top, width: margin.right, height: innerH
  }));
  chartEl.appendChild(el('rect', {
    class: 'axis-hitzone x',
    x: margin.left, y: margin.top + innerH, width: innerW, height: margin.bottom
  }));

  // Crosshair
  const ch = el('g', { id: 'crosshair' });
  ch.style.display = 'none';
  ch.style.pointerEvents = 'none';
  ch.appendChild(el('line', { id: 'ch-v', class: 'crosshair-line', y1: margin.top, y2: margin.top + innerH }));
  ch.appendChild(el('line', { id: 'ch-h', class: 'crosshair-line', x1: margin.left, x2: margin.left + innerW }));

  const xlblG = el('g', { id: 'ch-xlbl' });
  xlblG.appendChild(el('rect', {
    class: 'crosshair-label-bg',
    y: margin.top + innerH + 2, height: 18, width: 90, rx: 3
  }));
  xlblG.appendChild(el('text', {
    class: 'crosshair-label',
    y: margin.top + innerH + 15, 'text-anchor': 'middle'
  }));
  ch.appendChild(xlblG);

  const ylblG = el('g', { id: 'ch-ylbl' });
  ylblG.appendChild(el('rect', {
    class: 'crosshair-label-bg',
    x: margin.left - 50, height: 18, width: 44, rx: 3
  }));
  ylblG.appendChild(el('text', {
    class: 'crosshair-label',
    x: margin.left - 28, 'text-anchor': 'middle'
  }));
  ch.appendChild(ylblG);
  chartEl.appendChild(ch);
}

// ───────── Interactions ─────────
let panState = null;

chartEl.addEventListener('mousedown', (e) => {
  const t = e.target;
  if (!t.classList) return;
  if (t.classList.contains('plot-bg')) {
    panState = {
      mode: 'x',
      startX: e.clientX, startY: e.clientY,
      xDom: state.xDomain.slice(),
      yDom: state.yDomain.slice()
    };
    chartEl.style.cursor = 'grabbing';
    e.preventDefault();
  } else if (t.classList.contains('y')) {
    // Drag vertical sur axe Y = zoom Y (style TradingView)
    panState = {
      mode: 'y',
      startY: e.clientY,
      yDom: state.yDomain.slice()
    };
    chartEl.style.cursor = 'ns-resize';
    e.preventDefault();
  } else if (t.classList.contains('x')) {
    // Drag horizontal sur axe X = zoom X
    panState = {
      mode: 'zx',
      startX: e.clientX,
      xDom: state.xDomain.slice()
    };
    chartEl.style.cursor = 'ew-resize';
    e.preventDefault();
  }
});

window.addEventListener('mousemove', (e) => {
  if (!panState) return;
  if (panState.mode === 'x') {
    const dx = e.clientX - panState.startX;
    const xSpan = panState.xDom[1] - panState.xDom[0];
    const shiftX = (dx / innerW) * xSpan;
    state.xDomain = [panState.xDom[0] - shiftX, panState.xDom[1] - shiftX];
    // En pct, rebase Y auto sur la nouvelle fenêtre (on laisse computeDomains recalculer)
    // En base100, yDomain reste fixe 0-100 de toute façon
    if (state.displayMode === 'pct') state.yDomain = null;
    render();
  } else if (panState.mode === 'y') {
    // Zoom Y : drag vers le bas = compression (zoom in vers centre), vers le haut = expansion
    const dy = e.clientY - panState.startY;
    const factor = Math.pow(1.005, dy);  // ~1.65x tous les 100 pixels vers le bas
    const [y0, y1] = panState.yDom;
    const mid = (y0 + y1) / 2;
    const half = (y1 - y0) / 2 * factor;
    state.yDomain = [mid - half, mid + half];
    render();
  } else if (panState.mode === 'zx') {
    // Zoom X : drag à droite = compression, à gauche = expansion
    const dx = e.clientX - panState.startX;
    const factor = Math.pow(1.005, dx);
    const [x0, x1] = panState.xDom;
    const mid = (x0 + x1) / 2;
    const half = (x1 - x0) / 2 * factor;
    state.xDomain = [mid - half, mid + half];
    if (state.displayMode === 'pct') state.yDomain = null;
    render();
  }
});

window.addEventListener('mouseup', () => {
  if (panState) { panState = null; chartEl.style.cursor = 'crosshair'; }
});

chartEl.addEventListener('wheel', (e) => {
  const t = e.target;
  const isY = t.classList && t.classList.contains('y');
  const isX = t.classList && t.classList.contains('x');
  const isPlot = t.classList && t.classList.contains('plot-bg');
  if (!isY && !isX && !isPlot) return;
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.12 : 1 / 1.12;

  if (isY) {
    const [a, b] = state.yDomain;
    const mid = (a + b) / 2;
    const half = (b - a) / 2 * factor;
    state.yDomain = [mid - half, mid + half];
  } else if (isX) {
    const [a, b] = state.xDomain;
    const mid = (a + b) / 2;
    const half = (b - a) / 2 * factor;
    state.xDomain = [mid - half, mid + half];
    state.yDomain = null;  // rebase Y sur nouvelle fenêtre
  } else {
    const rect = chartEl.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const [a, b] = state.xDomain;
    const tAt = a + ((mx - margin.left) / innerW) * (b - a);
    state.xDomain = [tAt - (tAt - a) * factor, tAt + (b - tAt) * factor];
    state.yDomain = null;  // rebase Y sur nouvelle fenêtre
  }
  render();
}, { passive: false });

chartEl.addEventListener('dblclick', (e) => {
  if (e.target.classList && e.target.classList.contains('plot-bg')) resetView();
});

chartEl.addEventListener('mousemove', (e) => {
  if (panState) return;
  const rect = chartEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const inPlot = mx >= margin.left && mx <= margin.left + innerW
              && my >= margin.top && my <= margin.top + innerH;

  const ch = document.getElementById('crosshair');
  if (!inPlot) {
    if (ch) ch.style.display = 'none';
    tooltipEl.classList.remove('visible');
    document.getElementById('status-cursor').textContent = '';
    return;
  }
  if (ch) ch.style.display = '';

  const [x0, x1] = state.xDomain;
  const [y0, y1] = state.yDomain;
  const tAt = x0 + ((mx - margin.left) / innerW) * (x1 - x0);
  const vAt = y1 - ((my - margin.top) / innerH) * (y1 - y0);

  document.getElementById('ch-v').setAttribute('x1', mx);
  document.getElementById('ch-v').setAttribute('x2', mx);
  document.getElementById('ch-h').setAttribute('y1', my);
  document.getElementById('ch-h').setAttribute('y2', my);

  const xRect = document.querySelector('#ch-xlbl rect');
  const xText = document.querySelector('#ch-xlbl text');
  xRect.setAttribute('x', mx - 45);
  xText.setAttribute('x', mx);
  xText.textContent = formatTimeFull(tAt);

  const ylblG = document.getElementById('ch-ylbl');
  ylblG.setAttribute('transform', 'translate(0,' + (my - 9) + ')');
  const yText = ylblG.querySelector('text');
  yText.textContent = formatValue(vAt);

  document.getElementById('status-cursor').innerHTML =
    '<strong>Curseur:</strong> ' + formatTimeFull(tAt) + ' · ' + formatValue(vAt);

  const rows = [];
  CURRENCIES.forEach(c => {
    if (!state.visible.has(c.symbol) || !matchesGroup(c)) return;
    const s = state.data[c.symbol];
    if (!s) return;
    let lo = 0, hi = s.length - 1;
    while (lo < hi) {
      const m = (lo + hi) >> 1;
      if (s[m].t < tAt) lo = m + 1; else hi = m;
    }
    const pt = s[Math.max(0, Math.min(lo, s.length - 1))];
    const tv = transformValue(pt.v, c.symbol);
    rows.push({ symbol: c.symbol, color: c.color, v: tv });
  });
  rows.sort((a, b) => b.v - a.v);

  let html = '<div class="tooltip-header"><span>' + formatTimeFull(tAt) + '</span><span>' + state.tf + '</span></div>';
  rows.forEach(r => {
    html += '<div class="tooltip-row">' +
      '<span class="tooltip-swatch" style="background:' + r.color + '"></span>' +
      '<span>' + r.symbol + '</span>' +
      '<span style="color:' + colorForValue(r.v) + '">' +
      formatValue(r.v) + '</span></div>';
  });
  tooltipEl.innerHTML = html;

  const tipW = 220;
  let left = mx + 15;
  if (left + tipW > W - 10) left = mx - tipW - 15;
  tooltipEl.style.left = left + 'px';
  tooltipEl.style.top = (my + 15) + 'px';
  tooltipEl.classList.add('visible');
});

chartEl.addEventListener('mouseleave', () => {
  const ch = document.getElementById('crosshair');
  if (ch) ch.style.display = 'none';
  tooltipEl.classList.remove('visible');
  document.getElementById('status-cursor').textContent = '';
});

chartEl.addEventListener('mouseover', (e) => {
  const sym = e.target && e.target.getAttribute && e.target.getAttribute('data-symbol');
  if (sym && state.hovered !== sym) { state.hovered = sym; render(); }
});

chartEl.addEventListener('mouseout', (e) => {
  const sym = e.target && e.target.getAttribute && e.target.getAttribute('data-symbol');
  if (sym && state.hovered === sym) { state.hovered = null; render(); }
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') resetView();
});

function resetView() {
  state.xDomain = null; state.yDomain = null; render();
}

function populatePairList() {
  const list = document.getElementById('pair-list');
  list.innerHTML = '';
  const filtered = CURRENCIES.filter(matchesGroup);
  document.getElementById('pair-count').textContent = filtered.length;
  filtered.forEach(c => {
    const s = state.data[c.symbol];
    const last = s[s.length - 1];
    const prev = s[s.length - 2];
    const tvNow = transformValue(last.v, c.symbol);
    const tvPrev = transformValue(prev.v, c.symbol);
    const delta = tvNow - tvPrev;
    // Divergences où cette devise est impliquée (currency ou pair)
    const divs = state.divergences.filter(d =>
      (d.kind === 'currency' && d.symbol === c.symbol) ||
      (d.kind === 'pair' && (d.a === c.symbol || d.b === c.symbol))
    );
    const badges = divs.map(d => '<span class="div-badge ' + d.type.toLowerCase() + '">' + d.type + '</span>').join('');
    const row = document.createElement('div');
    row.className = 'pair-row' + (!state.visible.has(c.symbol) ? ' hidden' : '');
    const deltaTxt = (delta >= 0 ? '+' : '') + delta.toFixed(2);
    row.innerHTML =
      '<div>' +
        '<div class="pair-name" style="color:' + c.color + '">' + c.symbol + badges + '</div>' +
        '<div class="pair-price">' + formatValue(tvNow) + '</div>' +
      '</div>' +
      '<div class="pair-change ' + (delta >= 0 ? 'up' : 'down') + '">' +
        deltaTxt + '</div>';
    row.addEventListener('click', () => {
      if (state.visible.has(c.symbol)) state.visible.delete(c.symbol);
      else state.visible.add(c.symbol);
      render(); populatePairList(); populateLegend();
    });
    list.appendChild(row);
  });
}

function populateLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  CURRENCIES.filter(matchesGroup).forEach(c => {
    const s = state.data[c.symbol];
    const last = s[s.length - 1];
    const tv = transformValue(last.v, c.symbol);
    const row = document.createElement('div');
    row.className = 'legend-row' + (!state.visible.has(c.symbol) ? ' hidden' : '');
    row.innerHTML =
      '<div class="legend-swatch" style="background:' + c.color + '"></div>' +
      '<div class="legend-name">' + c.symbol + '</div>' +
      '<div class="legend-value" style="color:' + colorForValue(tv) + '">' +
        formatValue(tv) + '</div>';
    row.addEventListener('click', () => {
      if (state.visible.has(c.symbol)) state.visible.delete(c.symbol);
      else state.visible.add(c.symbol);
      render(); populatePairList(); populateLegend();
    });
    leg.appendChild(row);
  });
}

function populateDivPanel() {
  const list = document.getElementById('div-list');
  list.innerHTML = '';
  if (state.divergences.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted)">Aucune divergence active</div>';
    return;
  }
  state.divergences.forEach(d => {
    let displayName, color;
    if (d.kind === 'currency') {
      const c = CURRENCIES.find(x => x.symbol === d.symbol);
      if (!c) return;
      displayName = d.symbol;
      color = c.color;
    } else {
      const ca = CURRENCIES.find(x => x.symbol === d.a);
      if (!ca) return;
      displayName = d.symbol;  // ex: "AUD/JPY"
      color = ca.color;
    }
    const row = document.createElement('div');
    row.className = 'div-item';
    row.innerHTML =
      '<span class="div-badge ' + d.type.toLowerCase() + '">' + d.type + '</span>' +
      '<div>' +
        '<div style="font-weight:600;color:' + color + '">' + displayName + '</div>' +
        '<div style="color:var(--text-muted);font-size:10px">' + d.label + '</div>' +
      '</div>' +
      '<span style="color:var(--text-muted);font-size:10px">' + state.tf + '</span>';
    row.addEventListener('click', () => {
      // Zoom sur la fenêtre temporelle de la divergence
      const refSym = d.kind === 'currency' ? d.symbol : d.a;
      const s = state.data[refSym];
      if (!s) return;
      const span = s[d.endIdx].t - s[d.startIdx].t;
      state.xDomain = [s[d.startIdx].t - span * 0.3, s[d.endIdx].t + span * 0.3];
      state.yDomain = null;
      render();
    });
    list.appendChild(row);
  });
}

document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tf = btn.dataset.tf;
    if (tf === state.tf) return;
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tf = tf;
    state.xDomain = null; state.yDomain = null;
    buildData();
    const realCount = (state.rawData && state.rawData.timeSeries && state.rawData.timeSeries[tf])
      ? state.rawData.timeSeries[tf].length
      : TF_CONFIG[tf].points;
    const updateInfo = state.lastUpdate ? ' · ' + new Date(state.lastUpdate).toLocaleString('fr-FR', {dateStyle:'short', timeStyle:'short'}) : '';
    document.getElementById('chart-sub').textContent =
      tf + ' · 8 devises · ' + realCount + ' points · ' + TF_CONFIG[tf].label + updateInfo;
    populatePairList(); populateLegend(); populateDivPanel();
    render();
  });
});

document.querySelectorAll('.group-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.group = btn.dataset.group;
    state.xDomain = null; state.yDomain = null;
    populatePairList(); populateLegend(); render();
  });
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (mode === state.displayMode) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.displayMode = mode;
    // On recalcule le domaine Y car les valeurs transformées changent d'échelle.
    // On garde le domaine X pour ne pas perdre la fenêtre visible.
    state.yDomain = null;
    populateLegend(); render();
  });
});

document.getElementById('btn-reset').addEventListener('click', resetView);
document.getElementById('btn-divs').addEventListener('click', () => {
  document.getElementById('div-panel').classList.toggle('visible');
});
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
});

function updateSessions() {
  const h = new Date().getUTCHours();
  const map = {
    'session-sydney': h >= 22 || h < 7,
    'session-tokyo':  h >= 0 && h < 9,
    'session-london': h >= 8 && h < 17,
    'session-ny':     h >= 13 && h < 22
  };
  Object.entries(map).forEach(([id, active]) => {
    const elx = document.getElementById(id);
    if (!elx) return;
    elx.classList.toggle('active', active);
    const base = elx.textContent.split(' ·')[0].trim();
    elx.textContent = active ? (base + ' · LIVE') : base;
  });
}

// ═══════════════════════════════════════════════════════════════
// V3.7 — Initialisation : charge macrodata.json puis render
// ═══════════════════════════════════════════════════════════════
async function bootstrap() {
  // Placeholder pendant le fetch
  const subEl = document.getElementById('chart-sub');
  if (subEl) subEl.textContent = 'Chargement des données Yahoo…';

  const ok = await loadMacroData();

  if (!ok) {
    // Affiche un message d'erreur visible dans le chart
    if (subEl) subEl.textContent = '⚠️ Erreur : ' + (state.loadError || 'données indisponibles');
    // On continue quand même pour que l'interface ne plante pas
  }

  buildData();
  populatePairList();
  populateLegend();
  populateDivPanel();
  updateSessions();
  setInterval(updateSessions, 60000);

  const ptsCount = (state.rawData && state.rawData.timeSeries && state.rawData.timeSeries[state.tf])
    ? state.rawData.timeSeries[state.tf].length
    : 0;
  const updateInfo = state.lastUpdate ? ' · ' + new Date(state.lastUpdate).toLocaleString('fr-FR', {dateStyle:'short', timeStyle:'short'}) : '';
  if (subEl) subEl.textContent =
    state.tf + ' · 8 devises · ' + ptsCount + ' points · ' + TF_CONFIG[state.tf].label + updateInfo;

  render();
}

bootstrap();

window.addEventListener('resize', render);
</script>
